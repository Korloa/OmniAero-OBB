# Parameters
nc: 15  # 示例使用 DOTA 数据集，如果是 80 请修改
scales: # YOLO11 缩放比例
  n: [0.50, 0.25, 1024] # YOLO11n 比例 (比 v8 略宽)

# -------------------------------------------------------------
# Backbone: YOLO11 Dual-Stream (RGB+IR)
# -------------------------------------------------------------
backbone:
  # === 1. Dual-Stream Stem (输入 4 通道需在 DataConfig 处理或修改源码) ===
  - [-1, 1, RGB_Extract, [64]]  # 0: RGB 纹理提取
  - [-1, 1, IR_Extract, [64]]         # 1: IR 结构提取
  - [[1, 0], 1, Feature_Add, [64]]    # 2: Main_Stem (初步融合)

  # === 2. Main Stream (YOLO11 C3k2 架构) ===
  - [-1, 1, Conv, [128, 3, 2]]        # 3-P2/4
  - [-1, 2, C3k2, [128, False, 0.5]]  # 4 (c3k=False 类似 C2f)
  - [-1, 1, Conv, [256, 3, 2]]        # 5-P3/8
  - [-1, 2, C3k2, [256, False, 0.5]]  # 6-Main_P3 (输出给 Neck)
  - [-1, 1, Conv, [512, 3, 2]]        # 7-P4/16
  - [-1, 2, C3k2, [512, True, 0.5]]   # 8-Main_P4 (c3k=True 更深)
  - [-1, 1, Conv, [1024, 3, 2]]       # 9-P5/32
  - [-1, 2, C3k2, [1024, True, 0.5]]  # 10
  - [-1, 1, SPPF, [1024, 5]]          # 11-Main_P5
  - [-1, 1, C2PSA, [1024]]            # 12-YOLO11特有：空间自注意力增强

  # === 3. RGB Clean Assistant Path (更强的纹理保持) ===
  - [0, 1, Conv, [128, 3, 2]]         # 13-RGB_P2
  - [13, 1, C3k2, [256, False, 0.5]]  # 14-RGB_P3 (为下层提供融合素材)
  - [-1, 1, Conv, [512, 3, 2]]        # 15-RGB_P4
  - [-1, 1, Conv, [1024, 3, 2]]       # 16-RGB_P5

# -------------------------------------------------------------
# Neck: 多尺度动态融合 + YOLO11 PAN/FPN
# -------------------------------------------------------------
head:
  # === 深层跨模态注入 (P4, P5) ===
  - [[8, 15], 1, Cross_Modal_Attention, [512]]   # 17-Enhanced_P4
  - [[12, 16], 1, Cross_Modal_Attention, [1024]] # 18-Enhanced_P5

  # === 特征金字塔 ===
  - [-1, 1, nn.Upsample, [None, 2, 'nearest']]
  - [[-1, 17], 1, Concat, [1]]  # 20: 接 Enhanced_P4
  - [-1, 2, C3k2, [512, False]] # 21 (P4-Intermediate)

  - [-1, 1, nn.Upsample, [None, 2, 'nearest']]
  - [[-1, 6, 14], 1, Concat, [1]] # 23: 重点！融合 Main_P3 和 RGB_P3
  - [-1, 2, C3k2, [256, False]]   # 24: (FPN 输出层 P3) - 增加 RGB 信息利于 OBB 小目标

  - [-1, 1, Conv, [256, 3, 2]]
  - [[-1, 21], 1, Concat, [1]]  # 26:
  - [-1, 2, C3k2, [512, False]] # 27: (FPN 输出层 P4)

  - [-1, 1, Conv, [512, 3, 2]]
  - [[-1, 18], 1, Concat, [1]]  # 29: 接 Enhanced_P5
  - [-1, 2, C3k2, [1024, True]] # 30: (FPN 输出层 P5)

  # === OBB Head ===
  # YOLO11 的 OBB 通常包含解耦头设计
  - [[24, 27, 30], 1, OBB, [nc]]  # OBB Detect Head